<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Connection Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#F9F8F6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;font-family:'Montserrat',sans-serif;">
  
  <div style="max-width:600px;width:100%;background:#ffffff;padding:3rem;border:1px solid #e5e7eb;border-radius:4px;">
    <h2 style="font-size:1.25rem;font-weight:300;margin-bottom:1.5rem;">Supabase Connection Test</h2>
    <div id="status" style="padding:1.5rem;border:1px solid #f0eeeb;border-radius:2px;font-size:0.9rem;line-height:1.8;">
      ⏳ Testing connection...
    </div>
  </div>

  <script>
    function testConnection() {
      var status = document.getElementById('status');

      try {
        var client = window.supabase.createClient(
          'https://kuxwbxnenjdnvpvuuuel.supabase.co',
          'sb_publishable_rTJ6oJAHmK0fuwE1tXLX2g__3EeUzN5'
        );

        client.from('members').select('count', { count: 'exact', head: true }).then(function(res) {
          document.getElementById('status').innerHTML =
            '<span style="color:#065f46;font-size:1.5rem;font-weight:400;">✓ Connected!</div>' +
            '<br>Members in database: <strong>' + res.count + '</strong>' +
            '<br><br><span style="color:#6B7280;font-size:0.75rem;">If you see this, the key is valid. Replace EVERYTHING between the quotes in your supabase-config.js with this exact key.</span>';
        }).catch(function (err) {
          document.getElementById('status').innerHTML =
            '<span style="color:#dc2626;font-size:1.5rem;font-weight:400;">❌ Connection Failed</div>' +
            '<br><strong>Error: ' + err.message +
            '<br><br><span style="color:#6B7280;font-size:0.75rem;">Your API key is wrong. Go to supabase.com → Settings → API → Re-copy your key. Make sure you copy the FULL key without any extra text attached.</span>';
        });
      } catch (err) {
        document.getElementById('status').innerHTML =
          '<span style="color:#dc2626;font-size:1.5rem;font-weight:400;">❌ SDK Failed</div>' +
          '<br><strong>Error: ' + err.message +
          '<br><br><span style="color:#6B7280;font-size:0.75rem;">The Supabase SDK didn\'t load. Check your internet connection or try a different browser.</span>';
      }
    }

    if (window.supabase) {
      testConnection();
    } else {
      document.getElementById('status').innerHTML =
        '<span style="color:#6B7280;">⏳ Waiting for Supabase SDK to load...</div>';
      setTimeout(testConnection, 2000);
      setTimeout(testConnection, 5000);
    }
  </script>
</body>
</html>
